<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vooca - Premium Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>

    <div class="app-container">
        <div class="top-bar">
            <div class="progress-section">
                <span class="label">DARAXT</span>
                <div class="bar-track">
                    <div class="bar-fill" id="progress"></div>
                </div>
            </div>
            <div class="score-pill">
                <span id="score">0</span> 💎
            </div>
        </div>

        <div class="hero-section">
            <p id="motivation" class="fade-in">Olg'a qadam tashlang!</p>
        </div>

        <div class="flashcard-box" onclick="flipCard()">
            <div class="card-inner" id="card">
                <div class="card-side card-front">
                    <div class="glass-overlay"></div>
                    <span class="mini-text">INGLIZCHA</span>
                    <h1 id="word">Discipline</h1>
                </div>
                <div class="card-side card-back">
                    <div class="glass-overlay"></div>
                    <span class="mini-text">O'ZBEKCHA</span>
                    <h1 id="translation">Intizom</h1>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-secondary" onclick="handleAction(false)">Bilmiman</button>
            <button class="btn btn-primary" onclick="handleAction(true)">Bilaman</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
