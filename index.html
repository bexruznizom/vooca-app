<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vooca App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-container">
        
        <div class="top-nav">
            <div class="xp-badge">✨ <span id="xp">450</span> XP</div>
            <div class="level">Lesson 1: Basics</div>
        </div>

        <div class="main-content">
            <div class="flashcard" onclick="flipCard()">
                <div class="card-inner" id="card">
                    <div class="card-front">
                        <span class="label">ENGLISH</span>
                        <h1 id="word">Consistency</h1>
                        <p class="tap-hint">Tarjimani ko'rish uchun bosing</p>
                    </div>
                    <div class="card-back">
                        <span class="label">UZBEK</span>
                        <h1 id="translation">Izchillik</h1>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-skip" onclick="nextWord(false)">Bilmiman</button>
            <button class="btn btn-know" onclick="nextWord(true)">Bilaman</button>
        </div>

        <nav class="bottom-menu">
            <div class="nav-item active">📖<span>Practice</span></div>
            <div class="nav-item">📊<span>Stats</span></div>
            <div class="nav-item">👤<span>Profile</span></div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
